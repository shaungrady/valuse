pre-commit:
  parallel: true
  commands:
    format:
      glob: '*.{ts,tsx,json,md,yml,yaml}'
      run: pnpm prettier --write {staged_files}
      stage_fixed: true
    lint:
      glob: '*.{ts,tsx}'
      run: pnpm eslint --fix {staged_files}
      stage_fixed: true
    types:
      glob: '*.{ts,tsx}'
      run: pnpm tsc --noEmit
